server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Hashed Next.js assets — cache forever
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Images & logos — long cache (content-addressed by filename)
  location ~* \.(?:avif|webp|png|jpe?g|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public";
  }

  # Static export — try literal path, then .html, then 404
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }
}
